services:
  - type: web
    name: ai-demand-prediction-system
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ai-demand-prediction-system.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://ai-demand-prediction-system.onrender.com
      - key: DJANGO_ENABLE_SSL
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-demand-db
          property: connectionString

databases:
  - name: ai-demand-db
    plan: free
    databaseName: demand_db
    user: demand_user
